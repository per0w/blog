<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="per0w.space">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="coreCyber" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="cyberGrid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 H0 V4" fill="none" stroke="#22d3ee" stroke-opacity="0.14" stroke-width="0.35"/>
    </pattern>
  </defs>
  <!-- Глубокий «неоновый» фон -->
  <rect width="32" height="32" fill="#05050d"/>
  <rect width="32" height="32" fill="url(#cyberGrid)"/>
  <!-- Скан-полоса -->
  <rect x="0" y="14" width="32" height="0.55" fill="#06b6d4" opacity="0.2"/>
  <rect x="0" y="22" width="32" height="0.35" fill="#e879f9" opacity="0.12"/>
  <!-- Внешний острый восьмиугольник HUD -->
  <path
    fill="none"
    stroke="#00f5ff"
    stroke-opacity="0.35"
    stroke-width="2.2"
    stroke-linejoin="miter"
    d="M 9.5 2.5h13L29.5 9.5v13L22.5 29.5h-13L2.5 22.5v-13L9.5 2.5z"
  />
  <path
    fill="none"
    stroke="url(#neon)"
    stroke-width="1.1"
    stroke-linejoin="miter"
    d="M 9.5 2.5h13L29.5 9.5v13L22.5 29.5h-13L2.5 22.5v-13L9.5 2.5z"
  />
  <!-- Угловые скобки интерфейса -->
  <g fill="none" stroke-linecap="square" stroke-width="1.05">
    <path stroke="#22d3ee" d="M5 8V5h3M27 5h3v3M27 24v3h-3M5 27H2v-3"/>
    <path stroke="#e879f9" opacity="0.85" d="M6 9V6h3M26 6h3v3M26 23v3h-3M6 26H3v-3"/>
  </g>
  <!-- Внутренний шестиугольник «ядро» -->
  <path
    fill="url(#coreCyber)"
    fill-opacity="0.92"
    stroke="#f0abfc"
    stroke-width="0.65"
    stroke-opacity="0.9"
    d="M16 7.2l6.2 3.6v7.2L16 21.6l-6.2-3.6v-7.2L16 7.2z"
  />
  <!-- Блик -->
  <path fill="#ffffff" fill-opacity="0.22" d="M14 9.5l2-1.2 2 1.4-1.8 1-2.2-1.2z"/>
  <!-- Тики по углам рамки -->
  <g stroke="#06b6d4" stroke-width="0.9" stroke-linecap="square">
    <path d="M16 3v1.8M29 16h-1.8M16 29v-1.8M3 16h1.8"/>
  </g>
</svg>
