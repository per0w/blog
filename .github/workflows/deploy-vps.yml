name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://per0w.space
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: cd /opt/per0w-space && ./deploy/deploy.sh

      - name: Verify deployment
        run: |
          echo "### Deployment status" >> $GITHUB_STEP_SUMMARY
          sleep 10
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://per0w.space 2>/dev/null || echo "000")
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Blog | $STATUS |" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Blog returned HTTP $STATUS"
          fi
